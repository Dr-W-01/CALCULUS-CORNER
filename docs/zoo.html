<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Zoo • Calculus Corner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .sidebar { background-color: #111111; }
        .nav-active { background-color: #1f1f1f; border-left: 5px solid #b91c1c; color: #f87171; }
        .nav-item:hover { background-color: #1f1f1f; }
        .top-bar { background-color: #2a1515; border-bottom: 1px solid #3f1a1a; }
        .zoo-card {
            background-color: #111111;
            border: 1px solid #27272a;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .zoo-card:hover {
            border-color: #7f1d1d;
            transform: translateY(-2px);
        }
        .graph-wrap {
            aspect-ratio: 1 / 1;
            width: 100%;
            pointer-events: none;
        }
        .desmos-graph {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Top Title Bar -->
    <div class="top-bar px-8 py-5 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-[#b91c1c] rounded-2xl flex items-center justify-center">
                <span class="font-bold text-white text-2xl tracking-tighter">CC</span>
            </div>
            <span class="font-semibold text-3xl tracking-tighter">Calculus Corner</span>
        </div>
        <div class="flex items-center gap-x-4">
            <input type="text" placeholder="Search..." class="bg-[#111111] border border-zinc-800 rounded-3xl px-5 py-2 text-sm w-80 focus:outline-none focus:border-zinc-600">
            <div class="w-9 h-9 bg-zinc-800 rounded-full flex items-center justify-center text-sm font-medium">EW</div>
        </div>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <div class="sidebar w-72 min-h-[calc(100vh-81px)] border-r border-zinc-800 p-5">
            <div class="space-y-1 text-sm">
                <a href="index.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Home</a>
                <a href="courses.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Courses</a>
                <a href="zoo.html" class="nav-item nav-active flex items-center gap-x-3 px-4 py-3 rounded-2xl">Function Zoo</a>
                <a href="visualizers.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Visualizers</a>
                <a href="profile.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">My Profile</a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-8">
            <div class="w-full max-w-7xl">
                <header class="mb-10">
                    <h1 class="text-3xl font-semibold tracking-tight text-white mb-2">Function Zoo</h1>
                    <p class="text-zinc-400 text-base">A catalog of functions with graphs, domains, and key properties.</p>
                </header>

                <div id="zoo-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                    <p class="text-zinc-500 text-base col-span-full">Loading functions…</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GRAPH_COLOR = '#b91c1c';
        const POINT_COLOR = '#f87171';

        function renderKatex(el, tex) {
            katex.render(tex, el, { throwOnError: false, displayMode: false });
        }

        function initDesmosGraph(fn, index) {
            const elt = document.getElementById(`calculator-${fn.id}`);
            if (!elt || typeof Desmos === 'undefined') return;

            const calculator = Desmos.GraphingCalculator(elt, {
                expressions: false,
                settingsMenu: false,
                zoomButtons: false,
                keypad: false,
                expressionsTopbar: false,
                border: false,
                lockViewport: true,
                showGrid: true,
                showXAxis: true,
                showYAxis: true
            });

            if (fn.expressions) {
                fn.expressions.forEach(expr => {
                    calculator.setExpression({
                        id: expr.id,
                        latex: expr.latex,
                        color: expr.color || GRAPH_COLOR
                    });
                });
            } else if (fn.graph_expression) {
                calculator.setExpression({
                    id: `graph-${fn.id}`,
                    latex: fn.graph_expression,
                    color: GRAPH_COLOR
                });
            }

            if (fn.point) {
                calculator.setExpression({
                    id: `point-${fn.id}`,
                    latex: fn.point.latex,
                    pointStyle: fn.point.pointStyle,
                    color: fn.point.color || POINT_COLOR
                });
            }

            if (fn.points) {
                fn.points.forEach((point, pointIndex) => {
                    calculator.setExpression({
                        id: point.id || `point-${fn.id}-${pointIndex}`,
                        latex: point.latex,
                        pointStyle: point.pointStyle,
                        color: point.color || POINT_COLOR
                    });
                });
            }

            calculator.setMathBounds({
                left: -5,
                right: 5,
                bottom: -5,
                top: 5
            });
        }

        function createFunctionCard(fn) {
            const card = document.createElement('a');
            card.href = `function.html?id=${encodeURIComponent(fn.id)}`;
            card.className = 'zoo-card rounded-2xl p-5 block';

            card.innerHTML = `
                <h2 class="text-lg font-bold tracking-wide text-[#b91c1c] mb-2 card-title"></h2>
                <div class="flex items-center justify-between gap-4 mb-4">
                    <div class="katex-expr text-xl text-white min-w-0"></div>
                    <div class="katex-domain text-lg text-zinc-200 text-right shrink-0"></div>
                </div>
                <div class="graph-wrap overflow-hidden rounded-xl border border-zinc-800 bg-[#0a0a0a] mb-4">
                    <div id="calculator-${fn.id}" class="desmos-graph"></div>
                </div>
                <p class="text-zinc-300 text-lg leading-relaxed card-description"></p>
            `;

            card.querySelector('.card-title').textContent = fn.name.toUpperCase();
            card.querySelector('.card-description').textContent = fn.description;
            renderKatex(card.querySelector('.katex-expr'), fn.latex);
            renderKatex(card.querySelector('.katex-domain'), `\\textbf{Domain: } ${fn.domain}`);

            return card;
        }

        async function loadZoo() {
            const grid = document.getElementById('zoo-grid');

            try {
                const response = await fetch('data/functions-v2.json');
                if (!response.ok) throw new Error('Failed to load functions');
                const functions = await response.json();

                grid.innerHTML = '';
                functions.forEach((fn, index) => {
                    const card = createFunctionCard(fn);
                    grid.appendChild(card);
                    initDesmosGraph(fn, index);
                });
            } catch (err) {
                grid.innerHTML = '<p class="text-red-400 text-base col-span-full">Could not load function data from data/functions-v2.json.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadZoo);
    </script>
</body>
</html>
