<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Zoo • Calculus Corner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .sidebar { background-color: #111111; }
        .nav-active { background-color: #1f1f1f; border-left: 5px solid #b91c1c; color: #f87171; }
        .nav-item:hover { background-color: #1f1f1f; }
        .top-bar { background-color: #2a1515; border-bottom: 1px solid #3f1a1a; }
        .zoo-card {
            background-color: #111111;
            border: 1px solid #27272a;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .zoo-card:hover {
            border-color: #7f1d1d;
            transform: translateY(-2px);
        }
        .desmos-frame {
            pointer-events: none;
            border: 0;
        }
    </style>
</head>
<body>
    <!-- Top Title Bar -->
    <div class="top-bar px-8 py-5 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-[#b91c1c] rounded-2xl flex items-center justify-center">
                <span class="font-bold text-white text-2xl tracking-tighter">CC</span>
            </div>
            <span class="font-semibold text-3xl tracking-tighter">Calculus Corner</span>
        </div>
        <div class="flex items-center gap-x-4">
            <input type="text" placeholder="Search..." class="bg-[#111111] border border-zinc-800 rounded-3xl px-5 py-2 text-sm w-80 focus:outline-none focus:border-zinc-600">
            <div class="w-9 h-9 bg-zinc-800 rounded-full flex items-center justify-center text-sm font-medium">EW</div>
        </div>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <div class="sidebar w-72 min-h-[calc(100vh-81px)] border-r border-zinc-800 p-5">
            <div class="space-y-1 text-sm">
                <a href="index.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Home</a>
                <a href="courses.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Courses</a>
                <a href="zoo.html" class="nav-item nav-active flex items-center gap-x-3 px-4 py-3 rounded-2xl">Function Zoo</a>
                <a href="visualizers.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Visualizers</a>
                <a href="profile.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">My Profile</a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-8">
            <div class="max-w-6xl">
                <header class="mb-10">
                    <h1 class="text-3xl font-semibold tracking-tight text-white mb-2">Function Zoo</h1>
                    <p class="text-zinc-400 text-sm">A catalog of functions with graphs, domains, and key properties.</p>
                </header>

                <div id="zoo-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    <p class="text-zinc-500 text-sm col-span-full">Loading functions…</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderKatex(el, tex) {
            katex.render(tex, el, { throwOnError: false });
        }

        function desmosEmbedUrl(expression) {
            const latex = expression.replace(/\s+/g, '');
            const state = {
                version: 11,
                graph: {
                    viewport: { xmin: -5, ymin: -5, xmax: 5, ymax: 5 },
                    squareAxes: true
                },
                expressions: {
                    list: [{
                        type: 'expression',
                        id: '1',
                        color: '#b91c1c',
                        latex
                    }]
                }
            };
            return `https://www.desmos.com/calculator/embed?embed=1&edits=false&locked=true&state=${encodeURIComponent(JSON.stringify(state))}`;
        }

        function createFunctionCard(fn) {
            const card = document.createElement('a');
            card.href = `function.html?id=${encodeURIComponent(fn.id)}`;
            card.className = 'zoo-card rounded-2xl p-6 block';

            card.innerHTML = `
                <div class="flex items-start justify-between gap-4 mb-3">
                    <div>
                        <h2 class="text-lg font-medium text-white">${fn.name}</h2>
                        <div class="katex-expr text-zinc-300 mt-1"></div>
                    </div>
                    <span class="text-xs text-zinc-500 bg-zinc-900 border border-zinc-800 rounded-lg px-2 py-1 shrink-0">${fn.category}</span>
                </div>
                <div class="mb-4">
                    <p class="text-xs text-zinc-500 uppercase tracking-wider mb-1">Domain</p>
                    <div class="katex-domain text-sm text-zinc-300"></div>
                </div>
                <div class="aspect-square w-full overflow-hidden rounded-xl border border-zinc-800 bg-[#0a0a0a] mb-4">
                    <iframe
                        class="desmos-frame w-full h-full"
                        title="Graph of ${fn.name}"
                        loading="lazy"
                        src="${desmosEmbedUrl(fn.graph_expression)}"
                    ></iframe>
                </div>
                <p class="text-zinc-500 text-sm leading-relaxed">${fn.description}</p>
            `;

            renderKatex(card.querySelector('.katex-expr'), fn.latex);
            renderKatex(card.querySelector('.katex-domain'), fn.domain);

            return card;
        }

        async function loadZoo() {
            const grid = document.getElementById('zoo-grid');

            try {
                const response = await fetch('data/functions-v2.json');
                if (!response.ok) throw new Error('Failed to load functions');
                const functions = await response.json();

                grid.innerHTML = '';
                functions.forEach(fn => grid.appendChild(createFunctionCard(fn)));
            } catch (err) {
                grid.innerHTML = '<p class="text-red-400 text-sm col-span-full">Could not load function data from data/functions-v2.json.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadZoo);
    </script>
</body>
</html>
