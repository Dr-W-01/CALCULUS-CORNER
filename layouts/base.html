<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ PAGE_TITLE }} • Calculus Corner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .sidebar { background-color: #111111; }
        .nav-active { background-color: #1f1f1f; border-left: 5px solid #b91c1c; color: #f87171; }
        .nav-item:hover { background-color: #1f1f1f; }
        .top-bar { background-color: #2a1515; border-bottom: 1px solid #3f1a1a; }
        .content-card, .dashboard-card, .zoo-card, .content-box {
            background-color: #2a1515;
            border: 1px solid #3f1a1a;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }
        .content-card:hover, .dashboard-card:hover, .zoo-card:hover {
            background-color: #4a2020;
            border-color: #7f1d1d;
        }
        .section-header {
            background-color: #1a0d0d;
            margin: -1.5rem -1.5rem 0;
            padding: 0.875rem 1.5rem;
            border-bottom: 2px solid #5c1818;
            border-radius: 1rem 1rem 0 0;
        }
        .section-heading {
            color: #991b1b;
            font-weight: 700;
            text-align: center;
            margin: 0;
        }
        .section-body { padding-top: 1.25rem; }
        .fact-label, .field-label, .meta-label {
            color: #d4a853;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .fact-value { color: #f4f4f5; font-size: 1rem; margin-top: 0.35rem; }
        .fact-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.5rem; }
        .fact-pair > div { text-align: center; }
        .graph-facts-row { display: flex; flex-direction: column; gap: 1.5rem; }
        @media (min-width: 768px) { .graph-facts-row { flex-direction: row; align-items: flex-start; } }
        .graph-wrap-sm { aspect-ratio: 1 / 1; width: 100%; }
        .graph-trio { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
        @media (max-width: 900px) { .graph-trio { grid-template-columns: 1fr; } }
        .deriv-col { display: flex; flex-direction: column; gap: 0.75rem; }
        .deriv-title { color: #f4f4f5; font-size: 1.05rem; text-align: center; }
        .sign-line-wrap { position: relative; margin: 1.5rem 0.5rem 1rem; padding: 0 1.25rem; }
        .sign-line-axis {
            height: 2px; background: #71717a; position: relative;
        }
        .sign-line-axis::before, .sign-line-axis::after {
            content: ''; position: absolute; top: 50%; transform: translateY(-50%);
            border: 5px solid transparent;
        }
        .sign-line-axis::before { left: -14px; border-right-color: #71717a; }
        .sign-line-axis::after { right: -14px; border-left-color: #71717a; }
        .sign-line-point {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #e5e5e5; background: #2a1515;
        }
        .sign-line-point.filled { background: #e5e5e5; }
        .sign-line-sign {
            position: absolute; transform: translateX(-50%);
            font-weight: 700; font-size: 1.125rem; color: #e5e5e5;
        }
        .sign-line-sign.above { top: -1.6rem; }
        .sign-line-sign.below { bottom: -1.6rem; top: auto; }
        .sign-line-number {
            position: absolute; bottom: 100%; transform: translateX(-50%);
            margin-bottom: 6px; font-size: 0.8rem; color: #e5e5e5; font-weight: 600;
        }
        .chart-analysis { font-size: 0.875rem; color: #d4d4d8; line-height: 1.6; text-align: left; }
        .behavior-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
        @media (max-width: 640px) { .behavior-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Top Title Bar -->
    <div class="top-bar px-8 py-5 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-[#b91c1c] rounded-2xl flex items-center justify-center">
                <span class="font-bold text-white text-2xl tracking-tighter">CC</span>
            </div>
            <span class="font-semibold text-3xl tracking-tighter">Calculus Corner</span>
        </div>
        <div class="flex items-center gap-x-4">
            <input type="text" placeholder="Search..." class="bg-[#111111] border border-zinc-800 rounded-3xl px-5 py-2 text-sm w-80 focus:outline-none focus:border-zinc-600">
            <div class="w-9 h-9 bg-zinc-800 rounded-full flex items-center justify-center text-sm font-medium">EW</div>
        </div>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <div class="sidebar w-72 min-h-[calc(100vh-81px)] border-r border-zinc-800 p-5">
            <div class="space-y-1 text-sm">
                <a href="index.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Home</a>
                <a href="courses.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Courses</a>
                <a href="zoo.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Function Zoo</a>
                <a href="visualizers.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">Visualizers</a>
                <a href="profile.html" class="nav-item flex items-center gap-x-3 px-4 py-3 rounded-2xl">My Profile</a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-8">
            {{ MAIN_CONTENT }}
        </div>
    </div>

    <script>
        // KaTeX auto-render if needed
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[data-katex]').forEach(el => {
                katex.render(el.getAttribute('data-katex'), el, { throwOnError: false });
            });
        });
    </script>
</body>
</html>
