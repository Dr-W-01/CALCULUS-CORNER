# Updated July 2026 to fix Node.js 20 deprecation on GitHub-hosted runners.
# GitHub Actions now runs Node 24; this workflow pins actions to releases that
# natively support Node 24 (checkout v7, configure-pages v6, deploy-pages v5,
# upload-pages-artifact v5 — which bundles upload-artifact v7).
# Deploys the static site from the docs/ folder on pushes to main.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5